name: Gated pull request
on:
    workflow_dispatch:
    pull_request:
        branches: [master]
jobs:
    build-and-test:
        runs-on: windows-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4.1.2
            - name: setup node
              uses: actions/setup-node@v4.0.2
              with:
                  node-version: "22"
            - run: node -v
            - run: npm ci
            - name: npm audit
              shell: pwsh
              run: |
                  $process = Start-Process npm -ArgumentList 'audit', '--json' -NoNewWindow -Wait -RedirectStandardOutput audit.json -PassThru
                  $auditExitCode = $process.ExitCode

                  $audit = Get-Content audit.json -Raw | ConvertFrom-Json

                  if ($audit.error) {
                      Write-Error "npm audit failed: $($audit.error.summary)"
                      exit $auditExitCode
                  }

                  $vulnerabilities = $audit.metadata.vulnerabilities

                  if ($null -eq $vulnerabilities) {
                      Write-Error "Expected npm audit vulnerabilities metadata but found none."
                      exit 1
                  }

                  $severityCounts = [ordered]@{
                      critical = $vulnerabilities.critical
                      high = $vulnerabilities.high
                      moderate = $vulnerabilities.moderate
                      low = $vulnerabilities.low
                      info = $vulnerabilities.info
                  }

                  foreach ($severity in $severityCounts.Keys) {
                      $count = [int]$severityCounts[$severity]

                      if ($count -gt 0) {
                          $label = if ($count -eq 1) { "vulnerability" } else { "vulnerabilities" }
                          Write-Host "::warning::npm audit reported $count $severity $label. Run npm audit for details."
                      }
                  }
            - run: npm run build
            - run: npm run test
